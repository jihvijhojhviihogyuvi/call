<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Chat</title>
    <style>
        /* Add some basic styles */
        .end-call-button {
            color: red;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="video-container"></div>
    <input type="text" id="chat-input" placeholder="Type a message..." />
    <script>
        const activeStreams = {};
        const activeCalls = {};

        function escapeHtml(unsafe) {
            return unsafe
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function renderVideo(stream, username) {
            const videoElement = document.createElement('video');
            videoElement.srcObject = stream;
            videoElement.autoplay = true;
            document.getElementById('video-container').appendChild(videoElement);

            const endButton = document.createElement('button');
            endButton.innerText = 'End Call';
            endButton.className = 'end-call-button';
            endButton.onclick = () => endCall(stream);
            document.getElementById('video-container').appendChild(endButton);
        }

        function sendChat(message) {
            const parsedMessage = message.replace(/@([\w]+)/g, '<span>@$1</span>');
            const safeMessage = escapeHtml(parsedMessage);
            appendChat(safeMessage);
        }

        function appendChat(message) {
            const chatContainer = document.getElementById('chat-container');
            chatContainer.innerHTML += `<div>${message}</div>`;
        }

        function endCall(stream) {
            if (stream) {
                const tracks = stream.getTracks();
                tracks.forEach(track => track.stop());
                console.log('Call ended and streams released.');
            }
        }

        function handleDataConn(data, privateFlag) {
            if (privateFlag) {
                // Process private messages
            } else {
                // Process public messages
            }
        }
    </script>
</body>
</html>
