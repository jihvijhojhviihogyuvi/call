<!DOCTYPE html>
<html>
<head>
  <title>Group Video, Chat & Names</title>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background:#1a1a1a; color:#eee; margin:0; display: flex; height: 100vh; overflow: hidden; }
    
    /* Main Layout */
    .main-container { flex: 1; display: flex; flex-direction: column; padding: 15px; }
    #video-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; flex-grow: 1; overflow-y: auto; }
    
    /* Video Container */
    .video-container { position: relative; background: #000; border-radius: 12px; overflow: hidden; border: 2px solid #333; height: 200px; }
    video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
    .name-tag { position: absolute; bottom: 8px; left: 8px; background: rgba(0,0,0,0.6); padding: 2px 8px; border-radius: 4px; font-size: 12px; color: #fff; z-index: 10; }

    /* Sidebar Chat */
    .sidebar { width: 320px; background: #252525; border-left: 1px solid #444; display: flex; flex-direction: column; }
    #chat-box { flex: 1; padding: 15px; overflow-y: auto; font-size: 14px; }
    .msg { margin-bottom: 10px; padding: 8px; border-radius: 8px; background: #333; }
    .msg b { color: #00d4ff; }
    .input-area { padding: 15px; background: #1a1a1a; display: flex; gap: 8px; border-top: 1px solid #444; }
    
    /* Controls */
    .controls { background: #333; padding: 15px; border-radius: 12px; margin-bottom: 15px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
    input { padding: 8px; border-radius: 6px; border: 1px solid #555; background: #222; color: #fff; outline: none; }
    input:focus { border-color: #007bff; }
    button { padding: 8px 16px; cursor: pointer; border-radius: 6px; border: none; background: #28a745; color: white; font-weight: bold; transition: 0.2s; }
    button:hover { background: #218838; }
    #my-id-display { color: #ffcc00; font-weight: bold; }
  </style>
</head>
<body>

<div class="main-container">
  <div class="controls">
    <div><b>Your ID:</b> <span id="my-id-display">...</span></div>
    <input type="text" id="user-name" placeholder="Your Name (Optional)">
    <div style="border-left: 1px solid #555; height: 20px; margin: 0 10px;"></div>
    <input type="text" id="join-id" placeholder="Friend's 6-digit ID">
    <button onclick="connectToPeer()">Connect</button>
  </div>

  <div id="video-grid"></div>
</div>

<div class="sidebar">
  <div id="chat-box"></div>
  <div class="input-area">
    <input type="text" id="chat-input" placeholder="Message..." style="flex:1">
    <button onclick="sendMsg()">Send</button>
  </div>
</div>

<script>
const videoGrid = document.getElementById('video-grid');
const chatBox = document.getElementById('chat-box');
const chatInput = document.getElementById('chat-input');
const nameInput = document.getElementById('user-name');

let localStream;
let peer;
let connections = {}; 

// 1. Get Camera and Setup
navigator.mediaDevices.getUserMedia({ video: true, audio: true }).then(stream => {
  localStream = stream;
  addVideoStream(stream, "You (Local)", true, "local-user");
  initPeer();
}).catch(err => alert("Camera error: " + err.message));

function initPeer() {
  const myId = Math.floor(100000 + Math.random() * 900000).toString();
  document.getElementById('my-id-display').innerText = myId;
  peer = new Peer(myId);

  // Incoming Video
  peer.on('call', call => {
    // When someone calls us, we send our metadata (name) in the call options if possible,
    // but standard PeerJS uses the data connection for metadata.
    call.answer(localStream);
    call.on('stream', userStream => {
      // We'll update the name once the data connection is established
      addVideoStream(userStream, call.peer, false, call.peer);
    });
  });

  // Incoming Text/Data
  peer.on('connection', conn => {
    setupChatConnection(conn);
  });
}

function connectToPeer() {
  const targetId = document.getElementById('join-id').value;
  if (!targetId || targetId === peer.id) return;

  // Start Video
  const call = peer.call(targetId, localStream);
  call.on('stream', userStream => addVideoStream(userStream, targetId, false, targetId));

  // Start Data (for chat and names)
  const conn = peer.connect(targetId, {
    metadata: { name: nameInput.value || peer.id }
  });
  setupChatConnection(conn);
}

function setupChatConnection(conn) {
  connections[conn.peer] = { conn, name: conn.metadata?.name || conn.peer };
  
  // Update the video label if it exists
  const label = document.querySelector(`[data-id="${conn.peer}"] .name-tag`);
  if (label) label.innerText = connections[conn.peer].name;

  conn.on('data', data => {
    if (data.type === 'chat') {
      appendMessage(connections[conn.peer].name, data.message);
    }
  });

  conn.on('close', () => {
    document.querySelector(`[data-id="${conn.peer}"]`)?.remove();
    delete connections[conn.peer];
  });
}

function sendMsg() {
  const msgText = chatInput.value;
  const myName = nameInput.value || peer.id;
  if (!msgText) return;

  Object.values(connections).forEach(c => {
    c.conn.send({ type: 'chat', message: msgText });
  });
  
  appendMessage("You", msgText);
  chatInput.value = "";
}

function appendMessage(sender, text) {
  const div = document.createElement('div');
  div.className = 'msg';
  div.innerHTML = `<b>${sender}:</b> ${text}`;
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function addVideoStream(stream, displayName, isLocal, id) {
  if (document.querySelector(`[data-id="${id}"]`)) return;

  const container = document.createElement('div');
  container.className = 'video-container';
  container.setAttribute('data-id', id);

  const video = document.createElement('video');
  video.srcObject = stream;
  if (isLocal) video.muted = true;
  video.addEventListener('loadedmetadata', () => video.play());

  const nameTag = document.createElement('div');
  nameTag.className = 'name-tag';
  nameTag.innerText = displayName;

  container.append(video, nameTag);
  videoGrid.append(container);
}

chatInput.addEventListener("keypress", (e) => { if (e.key === "Enter") sendMsg(); });
</script>

</body>
</html>
