<!DOCTYPE html>
<html>
<head>
  <title>Group P2P Video Call</title>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <style>
    body { font-family: sans-serif; text-align: center; background:#1a1a1a; color:#eee; margin:0; padding:20px; }
    #video-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 10px; padding: 20px; }
    video { width: 100%; background: #000; border-radius: 10px; transform: scaleX(-1); } /* Mirror local */
    .controls { background: #333; padding: 20px; border-radius: 15px; display: inline-block; margin-bottom: 20px; }
    input { padding: 10px; border-radius: 5px; border: none; width: 150px; }
    button { padding: 10px 20px; cursor: pointer; border-radius: 5px; border: none; background: #28a745; color: white; font-weight: bold; }
    #status { color: #00ff00; font-family: monospace; margin-top: 10px; }
  </style>
</head>
<body>

<h2>Group Video Call</h2>

<div class="controls">
  <div><strong>Your ID:</strong> <span id="my-id">...</span></div>
  <br>
  <input type="text" id="join-id" placeholder="Enter 6-digit ID">
  <button onclick="connectToPeer()">Join Person</button>
</div>

<div id="status">Initializing...</div>

<div id="video-grid">
  </div>

<script>
const videoGrid = document.getElementById('video-grid');
const status = document.getElementById('status');
let localStream;
const peers = {};

// 1. Setup Local Video
const localVideo = document.createElement('video');
localVideo.muted = true;

navigator.mediaDevices.getUserMedia({ video: true, audio: true }).then(stream => {
  localStream = stream;
  addVideoStream(localVideo, stream);
  status.innerText = "Camera Active. Share your ID.";
  initPeer();
});

function initPeer() {
  // Generate random 6-digit ID
  const myId = Math.floor(100000 + Math.random() * 900000).toString();
  document.getElementById('my-id').innerText = myId;

  const peer = new Peer(myId);

  // 2. Handle incoming calls
  peer.on('call', call => {
    call.answer(localStream);
    const video = document.createElement('video');
    call.on('stream', userVideoStream => {
      addVideoStream(video, userVideoStream);
    });
  });

  // 3. Connection Logic
  window.connectToPeer = function() {
    const targetId = document.getElementById('join-id').value;
    if (!targetId || targetId === myId) return;

    status.innerText = "Connecting to " + targetId + "...";
    const call = peer.call(targetId, localStream);
    const video = document.createElement('video');

    call.on('stream', userVideoStream => {
      addVideoStream(video, userVideoStream);
    });
    
    call.on('close', () => video.remove());
  };

  peer.on('open', id => console.log('My ID:', id));
}

function addVideoStream(video, stream) {
  video.srcObject = stream;
  video.addEventListener('loadedmetadata', () => video.play());
  videoGrid.append(video);
}
</script>
</body>
</html>
